name: PHP Composer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Check PHP version
      run: |
        echo "=== PHP Version ==="
        php --version
        echo "=== Current Directory ==="
        pwd
        echo "=== Files in directory ==="
        ls -la

    - name: Validate composer.json and composer.lock
      run: |
        echo "=== Validating composer ==="
        composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: |
        echo "=== Installing composer dependencies ==="
        composer install --prefer-dist --no-progress -vvv

    - name: Check vendor directory
      run: |
        echo "=== Vendor directory contents ==="
        ls -la vendor/

    - name: Create output directory
      run: |
        echo "=== Creating _site directory ==="
        mkdir -p _site
        ls -la _site

    - name: Build with PHP/F3
      run: |
        echo "=== Running index.php ==="
        php -v
        php index.php > _site/index.html 2>&1
        echo "=== Build completed ==="
        echo "=== Output file ==="
        ls -la _site/
        
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -f _site/index.html
        git commit -m "Deploy to gh-pages" || true
        git push -f https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
