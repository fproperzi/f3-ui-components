name: PHP Composer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Check PHP version
      run: |
        echo "=== PHP Version ==="
        php --version
        echo "=== Current Directory ==="
        pwd
        echo "=== Files in directory ==="
        ls -la

    - name: Validate composer.json and composer.lock
      run: |
        echo "=== Validating composer ==="
        composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: |
        echo "=== Installing composer dependencies ==="
        composer install --prefer-dist --no-progress -vvv

    - name: Check vendor directory
      run: |
        echo "=== Vendor directory contents ==="
        ls -la vendor/

    - name: Create output directory
      run: |
        echo "=== Creating _site directory ==="
        mkdir -p _site
        ls -la _site

    - name: Build with PHP/F3
      run: |
        echo "=== Running index.php ==="
        php -v
        php index.php > _site/index.html 2>&1
        echo "=== Build completed ==="
        echo "=== Output file ==="
        ls -la _site/
        echo "=== File size ==="
        wc -c _site/index.html

    - name: Show output
      run: |
        echo "=== Generated HTML ==="
        cat _site/index.html
        
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
