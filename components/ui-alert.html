<div x-data="{ show: true }"
     x-show="show"
     x-cloak
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="flex items-start justify-between border-l-4 p-4 rounded-r-lg mb-4 {prop:_cls}">
    <div class="flex items-start gap-3">
        <span class="{prop:_iconCls} mt-0.5 select-none">{prop:_icon|raw}</span>
        <span class="text-sm"><slot></slot></span>
    </div>
    <button @click="show = false"
            class="ml-4 text-lg font-bold opacity-40 hover:opacity-100 transition-opacity leading-none focus:outline-none"
            title="Chiudi">&times;</button>
</div>
