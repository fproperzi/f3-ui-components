<div class="flex flex-col gap-1">
    <?php if ({prop:label?}): ?>
    <label for="{prop:id}" class="text-sm font-medium text-gray-700">
        {prop:label}<?php if ({prop:required?}): ?><span class="text-red-500 ml-0.5">*</span><?php endif; ?>
    </label>
    <?php endif; ?>
    <input type="{prop:type}"
           id="{prop:id}"
           name="{prop:name}"
           value="{prop:value}"
           placeholder="{prop:placeholder}"
           {prop:required|raw}
           {prop:disabled|raw}
           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm text-sm
                  focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                  bg-white text-gray-900 placeholder-gray-400 transition-shadow
                  <?php if ({prop:disabled?}): ?>opacity-60 cursor-not-allowed bg-gray-50<?php endif; ?>">
    <?php if ({prop:help?}): ?>
    <p class="text-xs text-gray-500">{prop:help}</p>
    <?php endif; ?>
</div>
